name: Auto Release Setup Script

on:
  push:
    branches: [main, master]
    paths:
      - 'scripts/*.sh'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.github/workflows/auto-release.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v2.9 or latest'
        required: true
        default: 'latest'
        type: string

permissions:
  contents: write

jobs:
  publish-setup-script:
    name: Publish scripts to Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="latest"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          found=0
          for script in scripts/*.sh; do
            [ -f "$script" ] || continue
            found=1

            filename=$(basename "$script")
            cp "$script" "release-assets/$filename"
            sha256sum "release-assets/$filename" | awk -v name="$filename" '{print $1 "  " name}' > "release-assets/${filename}.sha256"
          done

          if [ "$found" -ne 1 ]; then
            echo "No shell scripts found in scripts/"
            exit 1
          fi

          echo "Prepared assets:"
          ls -la release-assets

      - name: Build release notes
        id: notes
        run: |
          {
            echo "## Included assets"
            echo ""
            echo "| File | Description |"
            echo "| :--- | :---------- |"

            for asset in release-assets/*.sh; do
              [ -f "$asset" ] || continue
              filename=$(basename "$asset")
              if [ "$filename" = "redos_workstation_setup_tool_cli.sh" ]; then
                description="CLI-oriented workstation setup script with commands and flags"
              elif [ "$filename" = "redos_workstation_setup_tool.sh" ]; then
                description="Interactive workstation setup script"
              else
                description="Shell script from scripts/ directory"
              fi

              echo "| \`$filename\` | $description |"
              echo "| \`${filename}.sha256\` | SHA256 checksum for integrity verification |"
            done

            echo ""
            echo "## Quick start"
            echo ""
            echo '```bash'
            echo 'curl -sL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/redos_workstation_setup_tool_cli.sh | sudo bash'
            echo '```'
            echo ""
            echo "## Verify checksum"
            echo ""
            echo '```bash'
            echo 'curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/redos_workstation_setup_tool_cli.sh'
            echo 'curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/redos_workstation_setup_tool_cli.sh.sha256'
            echo 'sha256sum -c redos_workstation_setup_tool_cli.sh.sha256'
            echo '```'
            if [ -f release-assets/redos_workstation_setup_tool_cli.sh ]; then
              echo ""
              echo "## CLI quick start"
              echo ""
              echo '```bash'
              echo 'curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/redos_workstation_setup_tool_cli.sh'
              echo 'curl -LO https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/redos_workstation_setup_tool_cli.sh.sha256'
              echo 'sha256sum -c redos_workstation_setup_tool_cli.sh.sha256'
              echo 'chmod +x redos_workstation_setup_tool_cli.sh'
              echo 'sudo ./redos_workstation_setup_tool_cli.sh help'
              echo '```'
            fi
            echo ""
            echo "## Notes"
            echo ""
            echo "- The script supports RED OS 7.x and 8+."
            echo "- On RED OS 8+, CryptoPro and ViPNet from the current release are skipped as incompatible."
          } > release-body.md

          {
            echo "body<<EOF"
            cat release-body.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: redos-setup ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.version.outputs.tag == 'latest' }}
          generate_release_notes: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        run: |
          echo "Release updated: ${{ steps.version.outputs.tag }}"
          echo "Attached files:"
          ls -1 release-assets
