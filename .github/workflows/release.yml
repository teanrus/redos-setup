name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v3.0.0)'
        required: true
        type: string

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: true
        cache-dependency-path: go.sum

    - name: Install dependencies
      run: |
        go mod download
        go mod verify

    - name: Run tests
      run: |
        go test -v ./...
        go test -race -coverprofile=coverage.out ./...

    - name: Run linter
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        args: --timeout=5m --skip-files=".*_test.go"

    # Сборка для разных архитектур
    - name: Build for Linux amd64
      run: |
        mkdir -p release
        GOOS=linux GOARCH=amd64 go build -ldflags="-X 'main.version=${{ github.ref_name }}' -X 'main.buildDate=$(date -u +%Y-%m-%d_%H:%M:%S)'" -o release/redos-setup-linux-amd64 cmd/redos-setup/main.go

    - name: Build for Linux 386
      run: |
        GOOS=linux GOARCH=386 go build -ldflags="-X 'main.version=${{ github.ref_name }}'" -o release/redos-setup-linux-386 cmd/redos-setup/main.go

    - name: Build for Linux arm64
      run: |
        GOOS=linux GOARCH=arm64 go build -ldflags="-X 'main.version=${{ github.ref_name }}'" -o release/redos-setup-linux-arm64 cmd/redos-setup/main.go

    # Проверка бинарников
    - name: Verify binaries
      run: |
        file release/redos-setup-linux-*
        chmod +x release/redos-setup-linux-*
        ./release/redos-setup-linux-amd64 --version || true
        ./release/redos-setup-linux-386 --version || true
        ./release/redos-setup-linux-arm64 --version || true

    # Создание RPM пакета
    - name: Install rpm-build
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm

    - name: Create RPM package
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        
        # Создаем структуру директорий
        mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
        
        # Копируем бинарник
        cp release/redos-setup-linux-amd64 rpmbuild/SOURCES/redos-setup
        
        # Создаем spec файл
        cat > rpmbuild/SPECS/redos-setup.spec << 'EOF'
        Name: redos-setup
        Version: VERSION_PLACEHOLDER
        Release: 1%{?dist}
        Summary: CLI для автоматической настройки РЕД ОС 7.3/8
        License: MIT
        URL: https://github.com/teanrus/redos-setup
        Requires: golang >= 1.21
        
        %description
        Инструмент для автоматической установки и настройки программного обеспечения
        на РЕД ОС 7.3 и 8.
        
        %install
        mkdir -p %{buildroot}/usr/local/bin
        cp %{_sourcedir}/redos-setup %{buildroot}/usr/local/bin/
        chmod 755 %{buildroot}/usr/local/bin/redos-setup
        
        %files
        /usr/local/bin/redos-setup
        
        %changelog
        * %{date} teanrus <tyanrv@lbt.yanao.ru> - VERSION_PLACEHOLDER-1
        - Release VERSION_PLACEHOLDER
        EOF
        
        # Подставляем версию
        sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" rpmbuild/SPECS/redos-setup.spec
        
        # Собираем RPM
        rpmbuild -bb rpmbuild/SPECS/redos-setup.spec --define "_topdir $(pwd)/rpmbuild"
        
        # Копируем результат
        mkdir -p release/rpm
        cp rpmbuild/RPMS/x86_64/*.rpm release/ 2>/dev/null || true
        cp rpmbuild/RPMS/noarch/*.rpm release/ 2>/dev/null || true
        
        echo "RPM package created:"
        ls -la release/*.rpm

    # Создание архива с исходниками
    - name: Create source archive
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        git archive --format=tar.gz --output=release/redos-setup-$VERSION-source.tar.gz HEAD

    # Создание checksums
    - name: Create checksums
      run: |
        cd release
        sha256sum * > checksums.txt
        cat checksums.txt

    # Создание релиза на GitHub
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          release/redos-setup-linux-amd64
          release/redos-setup-linux-386
          release/redos-setup-linux-arm64
          release/*.rpm
          release/*.tar.gz
          release/checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}