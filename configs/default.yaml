# Конфигурация redos-setup

github:
  user: "teanrus"
  repo: "redos-setup"

paths:
  work_dir: "/home/inst"
  log_dir: "/var/log/redos-setup"

# Компоненты для разных версий РЕД ОС
components:
  redos7:
    cryptopro: "kriptopror4.tar.gz"
    vipnet_client: "vipnetclient-gui_gost_ru_x86-64_4.15.0-26717.rpm"
    vipnet_dp: "VipNet-DP.tar.gz"
    kaspersky: "kasp.tar.gz"
    1c: "1c.tar.gz"
  
  redos8:
    cryptopro: "cryptopro_5.0_redos8.tar.gz"
    vipnet_client: "vipnet_4.16_redos8.rpm"
    vipnet_dp: "vipnet_dp_4.16_redos8.tar.gz"
    kaspersky: "kasp_14.0_redos8.tar.gz"
    1c: "1c_8.3.25_redos8.tar.gz"

# Настройки системы
system:
  selinux: "disabled"
  dnf_parallel_downloads: 10

# Настройки совместимости
compatibility:
  strict_mode: false
  show_warnings: true